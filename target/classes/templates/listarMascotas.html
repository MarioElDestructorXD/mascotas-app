<html>
<head>
<title>Mascotas</title>
<link  th:href="@{/css/styles.css}" rel="stylesheet" >
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>

<body>
<nav class="navbar navbar-expand-lg bg-body-tertiary " style="background-color: rgb(128, 255, 255);">
  <div class="container-fluid">
    <a class="navbar-brand" href="#"><h1>Listado de Mascotas</h1></a>
		<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent"
			aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
			<span class="navbar-toggler-icon"></span>
		</button>
		<div class="collapse navbar-collapse" id="navbarSupportedContent">
			<ul class="navbar-nav me-auto mb-2 mb-lg-0">
				<li class="nav-item">
					<a class="nav-link active" aria-current="page" th:href="@{/mascotas/listar}">Inicio</a>
				</li>
				<li class="nav-item">
					<a class="nav-link active" aria-current="page" th:href="@{/mascotas/listar/Perro/false}">Perros</a>
				</li>
				<li class="nav-item">
					<a class="nav-link active" aria-current="page" th:href="@{/mascotas/listar/Gato/false}">Gatos</a>
				</li>
			</ul>
		</div>
	</div>
</nav>
<div class="form-check form-switch">
	<input class="form-check-input" type="checkbox" id="switch">
	<label class="form-check-label" for="switch">En adopción</label>
</div>
<div class="container-fluid">
	<div class="row">
		<div class="col-3" th:each="tmpMascota: ${listaMascotas}">
			<div class="card" style="margin-bottom: 20px;">
				<img th:src="@{/images/{i} (i = ${tmpMascota.imagen})}" class="card-img-top" width="120" height="250" />
				<div class="card-body">
					<h5 class="card-title">[[${tmpMascota.nombre}]]</h5>
					<p class="card-text">[[${tmpMascota.descripcion}]]</p>
						 <div th:switch="${tmpMascota.disponibleAdopcion ? 'Activo': 'Inactivo'}">
					<span class="badge bg-success m-2" th:case="'Activo'">Disponible adopción</span>
    				<span class="badge bg-danger m-2" th:case="'Inactivo'">No disponible adopción</span>
					</p>
				</div>
			</div>
		</div>
	</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"
	integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p"
	crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js"
	integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF"
	crossorigin="anonymous"></script>
<script src="https://code.jquery.com/jquery-3.6.3.js" integrity="sha256-nQLuAZGRRcILA+6dMBOvcRh5Pe310sBpanc6+QBmyVM="
	crossorigin="anonymous"></script>
<script>
		if (window.location.toString().includes("true"))
			document.getElementById("switch").checked = true

		$('#switch').on('change', function () {
			
			if (document.getElementById("switch").checked == true) {
				if (window.location.toString().includes("Perro")) {
					window.location.replace("http://localhost:8080/mascotas/listar/Perro/true")
				} else if (window.location.toString().includes("Gato")) {
					window.location.replace("http://localhost:8080/mascotas/listar/Gato/true")
				}
			} else {
				if (window.location.toString().includes("Perro")) {
					window.location.replace("http://localhost:8080/mascotas/listar/Perro/false")
				} else if (window.location.toString().includes("Gato")) {
					window.location.replace("http://localhost:8080/mascotas/listar/Gato/false")
				}
			}
		})
</script>
</body>

</html>
